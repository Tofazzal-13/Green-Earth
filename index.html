<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css link -->
     <link rel="stylesheet" href="style.css">
    <!-- tailwind and daisyUi added -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Green Earth</title>
</head>

<body>
    <main class="container mx-auto">
        <h2 class="text-[#4ade80] font-bold text-4xl  text-center">Choose Your Trees</h2>
        <div class="grid grid-cols-4 gap-8">
            <!-- Categories -->
            <div class="bg-white card card-body shadow-2xl col-span-1">
                <h2 class="font-bold text-3xl">Categories</h2>
                <div class="space-y-3 p-4">
                    <button class="btn btn-primary w-full" id="allTreesbtn">All Trees</button>

                    <!-- categories container -->
                    <div id="categoriesContainer" class="space-y-3">

                    </div>
                </div>
            </div>

            <!-- trees -->
            <div class="bg-white card card-body shadow-2xl col-span-2">
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                  
                </div>
                <!-- loading spinner -->
                <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-dots loading-xl"></span>
                </div>
            </div>

            <!-- cart -->
            <div class="bg-white card card-body shadow-2xl col-span-1">
                Cart
            </div>
        </div>
    </main>

    <!-- js connected -->
    <script src="js/script.js"></script>
</body>

</html>
